<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小馬娛樂 | 主播陣容 TALENTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-neon: #8600ff;
            --secondary-neon: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-blue: #00f3ff;
            --neon-red: #ff003c;
            --bg-dark: #050508;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
            padding-bottom: 120px;
            position: relative;
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .mono { font-family: 'Share Tech Mono', monospace; }

        /* 背景網格 - 最底層 */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(134, 0, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(134, 0, 255, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: -2;
        }

        .grid-overlay::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(5, 5, 8, 0.8) 100%);
        }

        /* 點陣紋理背景 */
        .dots-overlay {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(134, 0, 255, 0.2) 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: -1;
            opacity: 1;
        }

        /* 掃描線樣式 */
        .scanline {
            width: 100%;
            height: 4px; /* 增加高度使其可見 */
            z-index: 999; /* 提高層級 */
            background: linear-gradient(to bottom, 
                transparent, 
                rgba(0, 243, 255, 0.15) 50%, 
                rgba(0, 243, 255, 0.05) 80%, 
                transparent
            );
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            position: fixed;
            pointer-events: none;
            animation: scanline 6s linear infinite; /* 稍微加快速度 */
        }

        @keyframes scanline {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        /* 裝飾性幾何背景 */
        .floating-deco {
            position: fixed;
            color: var(--primary-neon);
            opacity: 0.05;
            font-family: 'Orbitron', sans-serif;
            font-size: 14vw;
            font-weight: 900;
            pointer-events: none;
            z-index: -1;
            user-select: none;
        }

        .floating-deco.outlined {
            color: transparent;
            -webkit-text-stroke: 1px var(--secondary-neon);
            opacity: 0.1;
        }

        /* 頁首樣式強化 */
        header.site-header {
            background: linear-gradient(to bottom, var(--bg-dark) 0%, var(--bg-dark) 70%, transparent 100%);
            position: relative;
            z-index: 50; 
            border-bottom: 0px solid rgba(134, 0, 255, 0.1);
        }

        /* 標籤樣式 */
        .filter-tag {
            font-size: 14px; 
            color: var(--secondary-neon); 
            border: 1px solid rgba(0, 243, 255, 0.3);
            padding: 4px 12px; 
            background: rgba(0, 243, 255, 0.05); 
            margin: 4px; 
            display: inline-block; 
            transition: all 0.3s ease;
            cursor: pointer;
            opacity: 0.4;
            letter-spacing: 0.5px;
        }

        .filter-tag.active {
            opacity: 1;
            background: rgba(0, 243, 255, 0.2);
            border-color: var(--secondary-neon);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
            font-weight: 700;
        }

        .talent-info-tag {
            font-size: 12px; 
            color: var(--secondary-neon); 
            border: 1px solid rgba(0, 243, 255, 0.3);
            padding: 2px 8px; 
            background: rgba(0, 243, 255, 0.05); 
            display: inline-block; 
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        /* 主播卡片 */
        .talent-card { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; text-align: center; width: 100%; }

        /* 頭像外框 */
        .cyber-frame {
            position: relative; width: 140px; height: 140px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; margin-bottom: 20px;
        }

        .glow-ring {
            position: absolute; inset: -4px; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--neon-purple), var(--secondary-neon), transparent);
            opacity: 0.2; filter: blur(8px); animation: rotate-glow 8s linear infinite; transition: 0.5s;
        }

        .thin-border {
            position: absolute; inset: 0; border-radius: 50%; padding: 3px;
            background: linear-gradient(135deg, rgba(188, 19, 254, 0.5), rgba(0, 243, 255, 0.5));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; transition: 0.5s;
        }

        .inner-photo {
            width: 130px; height: 130px; border-radius: 50%; overflow: hidden;
            background: #000; position: relative; z-index: 1; border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .inner-photo img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(20%) brightness(0.8); transition: 0.5s; }

        .cyber-frame:hover .glow-ring { opacity: 0.8; filter: blur(12px); transform: scale(1.05); }
        .cyber-frame:hover .thin-border { transform: scale(1.05); background: linear-gradient(135deg, var(--neon-purple), var(--secondary-neon)); }
        .cyber-frame:hover .inner-photo img { filter: grayscale(0%) brightness(1.1); transform: scale(1.1); }

        @keyframes rotate-glow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 通知彈窗（自定義代替 Alert） */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: rgba(134, 0, 255, 0.9); border: 1px solid var(--secondary-neon);
            padding: 10px 30px; border-radius: 2px; z-index: 9999;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 14px; font-weight: bold; letter-spacing: 1px;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* 控制面板 */
        .control-panel { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 98%; max-width: 1100px; z-index: 1000; }
        .panel-container {
            position: relative; display: flex; justify-content: center; align-items: center; gap: 10px; padding: 12px 20px;
            background: linear-gradient(180deg, rgba(20, 20, 20, 0.9) 0%, rgba(5, 5, 5, 0.95) 100%);
            backdrop-filter: blur(20px); border-top: 1px solid rgba(134, 0, 255, 0.4); border-bottom: 2px solid rgba(134, 0, 255, 0.2);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.8); border-radius: 4px;
        }

        @media (min-width: 768px) { .panel-container { gap: 30px; padding: 15px 50px; } }

         /* 控制面板設計 */
        .control-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 98%;
            max-width: 1100px;
            z-index: 1000;
        }

        .panel-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: linear-gradient(180deg, rgba(20, 20, 20, 0.9) 0%, rgba(5, 5, 5, 0.95) 100%);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(134, 0, 255, 0.4);
            border-bottom: 2px solid rgba(134, 0, 255, 0.2);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.8);
            border-radius: 4px;
        }

        @media (min-width: 768px) {
            .panel-container { gap: 30px; padding: 15px 50px; border-radius: 4px; }
            .panel-container::before, .panel-container::after {
                content: "";
                position: absolute;
                top: 0;
                width: 25px;
                height: 100%;
                background: inherit;
                z-index: -1;
            }
            .panel-container::before { left: -12px; transform: skewX(-15deg); border-left: 1px solid rgba(134, 0, 255, 0.4); }
            .panel-container::after { right: -12px; transform: skewX(15deg); border-right: 1px solid rgba(134, 0, 255, 0.4); }
            .panel-btn { font-size: 1.15rem; } 
        }

        @media (max-width: 767px) {
            .panel-container { gap: 6px; padding: 12px 10px; border-radius: 12px; }
            .panel-btn { font-size: 0.85rem !important; letter-spacing: 0.05em !important; } 
        }

        .nav-item { position: relative; }

        .panel-btn {
            position: relative;
            font-weight: bold;
            color: #ccc;
            transition: all 0.3s ease;
            white-space: nowrap;
            letter-spacing: 0.15em;
            cursor: pointer;
            padding-bottom: 8px;
            z-index: 2;
        }

        .energy-bar {
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0%;
            height: 2px;
            background: var(--secondary-neon);
            box-shadow: 0 0 10px var(--secondary-neon);
            transition: width 0.3s ease;
        }

        .nav-item:hover .panel-btn {
            color: var(--secondary-neon);
            text-shadow: 0 0 8px var(--secondary-neon);
        }

        .nav-item:hover .energy-bar {
            width: 100%;
        }

        /* 子選單樣式 */
        .submenu {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(5, 5, 5, 0.98);
            border: 1px solid var(--primary-neon);
            min-width: 180px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.3s;
            backdrop-filter: blur(15px);
            padding: 12px;
            box-shadow: 0 0 30px rgba(134, 0, 255, 0.4);
            pointer-events: none;
            z-index: 1001;
            margin-bottom: 15px;
        }

        .submenu::before {
            content: "";
            position: absolute;
            bottom: -20px;
            left: 0;
            width: 100%;
            height: 25px;
            background: transparent;
        }

        .nav-item:hover .submenu {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .submenu-link {
            display: block;
            padding: 10px 14px;
            color: #bbb;
            font-size: 0.95rem; 
            text-align: left;
            transition: all 0.2s;
            border-left: 2px solid transparent;
            text-decoration: none;
        }

        .submenu-link:hover {
            background: rgba(134, 0, 255, 0.15);
            color: var(--secondary-neon);
            border-left: 2px solid var(--secondary-neon);
            padding-left: 18px;
        }

    </style>
</head>
<body>

        <div id="filter-wrapper" class="flex flex-wrap gap-3 mb-16"></div>

                </div>
            </div>
            <div class="nav-item">
                <span class="panel-btn">網紅經紀</span>

                <div class="submenu">
                    <a href="https://xiaomasales-creator.github.io/sales/presentation/nav/主播陣容/index.html" class="submenu-link">小馬主播陣容</a>

        </div>

    <script>
        let currentLang = 'ch';
        let activeTags = new Set(['ALL']);
        
        // Hashtag 語言包
        const filterTagsData = [
            { id: "ALL", ch: "ALL", en: "ALL" },
            { id: "FPS", ch: "FPS", en: "FPS" },
            { id: "MMORPG", ch: "MMORPG", en: "MMORPG" },
            { id: "MOBA", ch: "MOBA", en: "MOBA" },
            { id: "社群紅人", ch: "社群紅人", en: "INFLUENCER" },
            { id: "舞蹈挑戰", ch: "舞蹈挑戰", en: "DANCE" },
            { id: "主持站台", ch: "主持站台", en: "HOST" },
            { id: "Vtuber", ch: "Vtuber", en: "Vtuber" }
        ];

        /**
         * 主播資料清單
         * 你可以在這裡填入網址。如果連結是 "#"，點擊時會提示建置中。
         */
        const talentsData = [
            { ch: { name: "星嵐", tags: ["FPS", "主持站台"] }, en: { name: "STORM", tags: ["FPS", "HOST"] }, img: "https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=400", url: "#" },
            { ch: { name: "莉可", tags: ["舞蹈挑戰", "社群紅人"] }, en: { name: "RIKO", tags: ["DANCE", "INFLUENCER"] }, img: "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=400", url: "#" },
            { ch: { name: "雷克", tags: ["MOBA", "MMORPG"] }, en: { name: "REX", tags: ["MOBA", "MMORPG"] }, img: "https://images.unsplash.com/photo-1560250097-0b93528c311a?q=80&w=400", url: "#" },
            { ch: { name: "幽奈", tags: ["Vtuber", "社群紅人"] }, en: { name: "YUNA", tags: ["VTUBER", "INFLUENCER"] }, img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=400", url: "#" },
            { ch: { name: "賽門", tags: ["FPS", "MOBA"] }, en: { name: "SIMON", tags: ["FPS", "MOBA"] }, img: "https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?q=80&w=400", url: "#" },
            { ch: { name: "夏木", tags: ["MMORPG", "主持站台"] }, en: { name: "NATSUKI", tags: ["MMORPG", "HOST"] }, img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=400", url: "#" },
            { ch: { name: "露娜", tags: ["舞蹈挑戰", "Vtuber"] }, en: { name: "LUNA", tags: ["DANCE", "VTUBER"] }, img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=400", url: "#" },
            { ch: { name: "凱文", tags: ["MOBA", "社群紅人"] }, en: { name: "KEVIN", tags: ["MOBA", "INFLUENCER"] }, img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=400", url: "#" },
            { ch: { name: "艾莉絲", tags: ["社群紅人", "舞蹈挑戰"] }, en: { name: "ALICE", tags: ["REELS", "DANCE"] }, img: "https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?q=80&w=400", url: "#" },
            { ch: { name: "阿強", tags: ["MMORPG", "主持站台"] }, en: { name: "JON", tags: ["MMORPG", "HOST"] }, img: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?q=80&w=400", url: "#" },
            { ch: { name: "美咲", tags: ["Vtuber", "FPS"] }, en: { name: "MISAKI", tags: ["VTUBER", "FPS"] }, img: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=400", url: "#" }
        ];

        function renderFilterTags() {
            const wrapper = document.getElementById('filter-wrapper');
            wrapper.innerHTML = '';
            filterTagsData.forEach(tagInfo => {
                const span = document.createElement('span');
                span.className = `filter-tag ${activeTags.has(tagInfo.id) ? 'active' : ''}`;
                span.innerText = `#${tagInfo[currentLang]}`;
                span.onclick = () => handleTagClick(tagInfo.id);
                wrapper.appendChild(span);
            });
        }

        function handleTagClick(tagId) {
            if (tagId === 'ALL') {
                activeTags.clear();
                activeTags.add('ALL');
            } else {
                activeTags.delete('ALL');
                if (activeTags.has(tagId)) activeTags.delete(tagId);
                else activeTags.add(tagId);
                if (activeTags.size === 0) activeTags.add('ALL');
            }
            renderFilterTags();
            renderTalents();
        }

        function renderTalents() {
            const listContainer = document.getElementById('talents-list');
            listContainer.innerHTML = '';
            let filteredData = talentsData;
            if (!activeTags.has('ALL') && activeTags.size > 0) {
                const selectedArray = Array.from(activeTags);
                filteredData = talentsData.filter(talent => {
                    return selectedArray.every(tag => talent.ch.tags.includes(tag));
                });
            }

            filteredData.forEach((talent) => {
                const data = talent[currentLang];
                const item = document.createElement('div');
                item.className = 'talent-card';
                item.innerHTML = `
                    <div class="cyber-frame" onclick="navigateToTalent('${talent.url}')">
                        <div class="glow-ring"></div>
                        <div class="thin-border"></div>
                        <div class="inner-photo"><img src="${talent.img}" alt="${data.name}"></div>
                    </div>
                    <div class="w-full text-center px-2">
                        <div class="cyber-font text-[18px] tracking-[0.15em] text-white/90 uppercase font-bold mb-3">${data.name}</div>
                        <div class="flex flex-wrap justify-center gap-1">
                            ${data.tags.map(t => `<span class="talent-info-tag">#${t}</span>`).join('')}
                        </div>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function navigateToTalent(url) {
            if (url && url !== "#") {
                window.location.href = url;
            } else {
                showToast();
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ch' ? 'en' : 'ch';
            document.getElementById('main-title').innerText = currentLang === 'ch' ? '主播陣容' : 'TALENT ROSTER';
            document.getElementById('sub-title').innerText = currentLang === 'ch' ? 'TALENTS' : 'CYBER_INFLUENCERS';
            renderFilterTags();
            renderTalents();
        }

        window.onload = () => { renderFilterTags(); renderTalents(); };
    </script>
</body>
</html>
