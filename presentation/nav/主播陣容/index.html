<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小馬娛樂 | 主播陣容 Streamers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-neon: #8600ff;
            --secondary-neon: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-blue: #00f3ff;
            --neon-red: #ff003c;
            --bg-dark: #050508;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
            padding-bottom: 120px;
            position: relative;
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .mono { font-family: 'Share Tech Mono', monospace; }

        /* 背景網格 - 最底層 */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(134, 0, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(134, 0, 255, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: -2;
        }

        .grid-overlay::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(5, 5, 8, 0.8) 100%);
        }

        /* 點陣紋理背景 */
        .dots-overlay {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(134, 0, 255, 0.2) 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: -1;
            opacity: 1;
        }

        /* CRT 掃描線效果 */
        .scanline {
            width: 100%;
            height: 2px;
            z-index: 100;
            background: rgba(0, 243, 255, 0.02);
            opacity: 0.1;
            position: fixed;
            pointer-events: none;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { top: -5%; }
            100% { top: 105%; }
        }

        /* 裝飾性幾何背景 */
        .floating-deco {
            position: fixed;
            color: var(--primary-neon);
            opacity: 0.05;
            font-family: 'Orbitron', sans-serif;
            font-size: 14vw;
            font-weight: 900;
            pointer-events: none;
            z-index: -1;
            user-select: none;
        }

        .floating-deco.outlined {
            color: transparent;
            -webkit-text-stroke: 1px var(--secondary-neon);
            opacity: 0.1;
        }

        /* 滿版容器與邊界裝飾 */
        .s-path-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 40px 80px 40px;
            position: relative;
        }

        /* 頁首樣式強化 */
        header.site-header {
            background: linear-gradient(to bottom, var(--bg-dark) 0%, var(--bg-dark) 70%, transparent 100%);
            position: relative;
            z-index: 50; 
            border-bottom: 1px solid rgba(134, 0, 255, 0.1);
        }

        /* 語言切換按鈕樣式 */
        .lang-btn {
            padding: 2px 8px;
            font-size: 12px;
            font-family: 'Orbitron', sans-serif;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            cursor: pointer;
            border-radius: 2px;
        }

        .lang-btn:hover {
            border-color: var(--secondary-neon);
            color: var(--secondary-neon);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        .lang-btn.active {
            background: var(--secondary-neon);
            color: var(--bg-dark);
            border-color: var(--secondary-neon);
            font-weight: 900;
            box-shadow: 0 0 15px var(--secondary-neon);
        }

        /* 主播頭像外框 HUD 動效 */
        .avatar-hud-frame {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto;
        }

        .avatar-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid var(--secondary-neon);
            box-shadow: 0 0 20px var(--secondary-neon), inset 0 0 10px var(--secondary-neon);
            transition: all 0.3s ease;
        }

        .avatar-hud-outer {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 1px dashed rgba(134, 0, 255, 0.4);
            animation: rotate-slow 20s linear infinite;
        }

        .streamer-card:hover .avatar-ring {
            transform: scale(1.05);
            border-color: var(--neon-purple);
            box-shadow: 0 0 25px var(--neon-purple), inset 0 0 15px var(--neon-purple);
        }

        @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 科技感卡片剪裁與發光 */
        .content-card {
            padding: 25px; 
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--secondary-neon);
            clip-path: polygon(0 0, 88% 0, 100% 12%, 100% 100%, 12% 100%, 0 88%);
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .content-card:hover {
            transform: translateY(-5px);
            border-top-color: var(--neon-purple);
            box-shadow: 0 10px 30px rgba(134, 0, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        /* 控制面板設計 */
        .control-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 98%;
            max-width: 1100px;
            z-index: 1000;
        }

        .panel-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: linear-gradient(180deg, rgba(20, 20, 20, 0.9) 0%, rgba(5, 5, 5, 0.95) 100%);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(134, 0, 255, 0.4);
            border-bottom: 2px solid rgba(134, 0, 255, 0.2);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.8);
            border-radius: 4px;
        }

        @media (min-width: 768px) {
            .panel-container { gap: 30px; padding: 15px 50px; border-radius: 4px; }
            .panel-container::before, .panel-container::after {
                content: "";
                position: absolute;
                top: 0;
                width: 25px;
                height: 100%;
                background: inherit;
                z-index: -1;
            }
            .panel-container::before { left: -12px; transform: skewX(-15deg); border-left: 1px solid rgba(134, 0, 255, 0.4); }
            .panel-container::after { right: -12px; transform: skewX(15deg); border-right: 1px solid rgba(134, 0, 255, 0.4); }
            .panel-btn { font-size: 1.15rem; } 
        }

        @media (max-width: 767px) {
            .panel-container { gap: 6px; padding: 12px 10px; border-radius: 12px; }
            .panel-btn { font-size: 0.85rem !important; letter-spacing: 0.05em !important; } 
        }

        .nav-item { position: relative; }

        .panel-btn {
            position: relative;
            font-weight: bold;
            color: #ccc;
            transition: all 0.3s ease;
            white-space: nowrap;
            letter-spacing: 0.15em;
            cursor: pointer;
            padding-bottom: 14px;
            z-index: 2;
        }

        .energy-bar {
            position: absolute;
            bottom: 2px;
            left: 0;
            width: 0%;
            height: 2px;
            background: var(--secondary-neon);
            box-shadow: 0 0 10px var(--secondary-neon);
            transition: width 0.3s ease;
        }

        .nav-item:hover .panel-btn {
            color: var(--secondary-neon);
            text-shadow: 0 0 8px var(--secondary-neon);
        }

        .nav-item:hover .energy-bar {
            width: 100%;
        }

        /* 子選單樣式 */
        .submenu {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(5, 5, 5, 0.98);
            border: 1px solid var(--primary-neon);
            min-width: 180px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.3s;
            backdrop-filter: blur(15px);
            padding: 12px;
            box-shadow: 0 0 30px rgba(134, 0, 255, 0.4);
            pointer-events: none;
            z-index: 1001;
            margin-bottom: 15px;
        }

        .submenu::before {
            content: "";
            position: absolute;
            bottom: -20px;
            left: 0;
            width: 100%;
            height: 25px;
            background: transparent;
        }

        .nav-item:hover .submenu {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .submenu-link {
            display: block;
            padding: 10px 14px;
            color: #bbb;
            font-size: 0.95rem; 
            text-align: left;
            transition: all 0.2s;
            border-left: 2px solid transparent;
            text-decoration: none;
        }

        .submenu-link:hover {
            background: rgba(134, 0, 255, 0.15);
            color: var(--secondary-neon);
            border-left: 2px solid var(--secondary-neon);
            padding-left: 18px;
        }

        @media (max-width: 768px) {
            .s-path-container { padding: 20px 20px 120px 20px; }
            .floating-deco { display: none; }
        }
    </style>
</head>
<body>
    <!-- 視覺特效層 -->
    <div class="dots-overlay"></div>
    <div class="grid-overlay"></div>
    <div class="scanline"></div>
    
    <!-- 背景裝飾文字 -->
    <div class="floating-deco" style="top: 10%; left: -5%;">XM</div>
    <div class="floating-deco outlined" style="bottom: 15%; right: -2%;">XIAOMA</div>

    <!-- 標頭區域 [1] -->
    <header class="site-header w-full pt-20 pb-16 overflow-hidden">
        <div class="max-w-[1400px] mx-auto px-10 flex flex-col items-start relative">
            <div class="flex items-center gap-3 mb-4">
                <div class="deco-block w-[10px] h-[10px] bg-[#bc13fe] animate-pulse"></div>
                <span class="cyber-font text-[10px] tracking-[0.6em] text-white/40 uppercase">XIAOMA ENT.</span>
            </div>
            
            <div class="flex flex-col mb-4">
                <div class="flex items-end gap-6 mb-2">
                    <h1 class="text-5xl md:text-7xl font-black italic tracking-tighter leading-none" id="main-header-title">網紅經紀</h1>
                    <!-- 語言切換按鈕 -->
                    <div class="flex gap-2 mb-1">
                        <button onclick="switchLang('ch')" id="btn-ch" class="lang-btn active">CH</button>
                        <button onclick="switchLang('en')" id="btn-en" class="lang-btn">EN</button>
                    </div>
                </div>
                <span class="cyber-font text-xl md:text-3xl font-black text-white/10 uppercase italic tracking-widest leading-none" id="main-header-sub">STREAMERS_LIST</span>
            </div>
            
            <div class="w-[60px] h-[4px] bg-gradient-to-r from-[#bc13fe] to-[#00d2ff]"></div>
        </div>
    </header>

    <!-- 主要內容區域：生成 11 個主播大頭貼與名片 -->
    <main class="s-path-container">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8" id="streamers-grid">
            <!-- 迴圈生成 11 個節點 -->
            <script>
                const gridContainer = document.getElementById('streamers-grid');
                for (let i = 1; i <= 11; i++) {
                    gridContainer.innerHTML += `
                        <div class="streamer-card content-card text-center" onclick="openModal(${i})">
                            <div class="avatar-hud-frame mb-4">
                                <div class="avatar-hud-outer"></div>
                                <div class="avatar-ring flex items-center justify-center overflow-hidden bg-black/50">
                                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=streamer${i}" alt="Streamer ${i}" class="w-[85%] h-[85%] object-cover rounded-full" />
                                </div>
                            </div>
                            <div class="mono text-[11px] text-[#00f3ff] mb-1 tracking-wider">#STREAMER_0${i}</div>
                            <h3 class="text-xl font-black italic tracking-wide mb-2 text-white" id="name-${i}">主播 ${i}</h3>
                            <p class="text-xs text-white/50 line-clamp-1" id="hash-${i}">#遊戲實況 #3C開箱</p>
                        </div>
                    `;
                }
            </script>
        </div>
    </main>

    <!-- 互動彈窗（Modal）-->
    <div id="info-modal" class="fixed inset-0 bg-black/80 backdrop-filter backdrop-blur-md hidden items-center justify-center z-[2000] p-4">
        <div class="bg-[#0a0a0f] border-2 border-[#8600ff] p-8 max-w-md w-full relative clip-path-modal" style="clip-path: polygon(0 0, 90% 0, 100% 10%, 100% 100%, 10% 100%, 0 90%);">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-white/50 hover:text-[#00f3ff] font-bold cyber-font">[X]</button>
            <div class="text-center">
                <div class="w-32 h-32 mx-auto mb-4 border-2 border-[#00f3ff] rounded-full overflow-hidden p-2 bg-black/40">
                    <img id="modal-img" src="" alt="Avatar" class="w-full h-full object-cover rounded-full">
                </div>
                <h2 id="modal-name" class="text-3xl font-black italic tracking-tighter text-white mb-2">主播姓名</h2>
                <div id="modal-tags" class="mono text-sm text-[#00f3ff] mb-4">#Tags</div>
                <div class="w-full h-[1px] bg-white/10 my-4"></div>
                <p id="modal-desc" class="text-white/70 text-sm leading-relaxed text-left">數據載入中...</p>
            </div>
        </div>
    </div>

    <!-- 底部控制面板 [2] -->
    <nav class="control-panel">
        <div class="panel-container">
            <div class="nav-item">
                <span class="panel-btn">關於小馬</span>
                <div class="energy-bar"></div>
                <div class="submenu">
                    <a href="#" class="submenu-link">首頁</a>
                    <a href="#" class="submenu-link">品牌特色</a>
                    <a href="#" class="submenu-link">合作項目</a>
                    <a href="#" class="submenu-link">服務流程</a>
                </div>
            </div>
            <div class="nav-item">
                <span class="panel-btn">網紅經紀</span>
                <div class="energy-bar"></div>
                <div class="submenu">
                    <a href="#" class="submenu-link">小馬主播陣容</a>
                    <a href="#" class="submenu-link">經典案例</a>
                    <a href="#" class="submenu-link">經常合作KOL</a>
                </div>
            </div>
            <div class="nav-item">
                <span class="panel-btn">活動花絮</span>
                <div class="energy-bar"></div>
                <div class="submenu">
                    <a href="#" class="submenu-link">商案總覽</a>
                    <a href="#" class="submenu-link">線下活動花絮</a>
                </div>
            </div>
            <div class="nav-item">
                <span class="panel-btn">其他服務</span>
                <div class="energy-bar"></div>
                <div class="submenu">
                    <a href="#" class="submenu-link">影音剪輯</a>
                    <a href="#" class="submenu-link">網頁製作</a>
                    <a href="#" class="submenu-link">美術設計</a>
                    <a href="#" class="submenu-link">社群經營</a>
                </div>
            </div>
            <div class="nav-item">
                <span class="panel-btn">聯絡我們</span>
                <div class="energy-bar"></div>
                <div class="submenu">
                    <a href="#" class="submenu-link">工商洽談</a>
                    <a href="#" class="submenu-link">加入小馬</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 核心數據與控制指令 [3] -->
    <script>
        // 擴充至 11 位主播的完整數據集（包含彈窗細節描述）
        const langData = {
            ch: {
                header: { title: "網紅經紀", sub: "STREAMERS_LIST" },
                streamers: {
                    1: { name: "狂暴小馬", tags: "#射擊遊戲 #電競硬體", desc: "前職業電競選手，專精各類 FPS 射擊遊戲。其精湛操作與風趣的毒舌風格，在 3C 週邊硬體與新游推廣商案中轉換率極高。" },
                    2: { name: "妮歐 Neon", tags: "#主機遊戲 #3C科技", desc: "主打賽博龐克風格女性實況主，擅長 3C 開箱與大型主機遊戲 3A 大作全破評測，在硬派玩家群體中具備強大的影響力。" },
                    3: { name: "零號機 Zero", tags: "#二次元手遊 #動漫", desc: "ACG 領域資深意見領袖，專精二次元畫風手遊與卡牌戰略遊戲，配音與角色實測影片在 YouTube 擁有極高播放量。" },
                    4: { name: "微風大叔", tags: "#MMORPG #策略經營", desc: "核心向老牌實況主，對宏大世界觀的 MMORPG 與策略模擬遊戲有獨到見解，受眾年齡層具備極高的高客單價消費力。" },
                    5: { name: "艾莉絲 Iris", tags: "#大眾娛樂 #聯名推廣", desc: "甜美系全能女藝人，跨足電玩、生活與美妝。擅長將遊戲及 APP 以生活化的方式推廣給大眾市場，親和力滿分。" },
                    6: { name: "代號 404", tags: "#獨立遊戲 #高難挑戰", desc: "技術流神祕實況主，專攻類魂系列與各類高難度獨立遊戲。擅長創造高度互動的直播效果與社群迷因話題。" },
                    7: { name: "電玩雷達", tags: "#新遊開箱 #跨平台", desc: "全方位遊戲評測媒體型 KOL，即時速報各大平台最新遊戲動態，是各大遊戲大廠發布首發商案的第一首選合作夥伴。" },
                    8: { name: "密碼破譯員", tags: "#密室解謎 #AVG遊戲", desc: "頭腦派實況主，主打懸疑、解謎、恐怖遊戲實況。其沉浸式的劇情說書風格深受粉絲喜愛，極適合劇情導向的新遊宣傳。" },
                    9: { name: "賽博極客", tags: "#硬體改裝 #高階3C", desc: "頂級硬體改裝大師兼 3C 評測博主，專注於電競主機水冷改裝、顯示卡與高階電競螢幕實測，是 3C 廠商的硬核指標。" },
                    10: { name: "像素貓 CatX", tags: "#休閒手遊 #女性向", desc: "療癒系實況主，主要受眾為女性與學生族群，針對輕度休閒手遊、女性向遊戲能提供精準且極具渲染力的社群互動推廣。" },
                    11: { name: "銀翼 V", tags: "#虛擬實況 #VTuber", desc: "小馬娛樂旗下的頂級虛擬主播，完美結合未來感主視覺。在虛擬實況圈擁有龐大死忠粉絲，極適合跨次元連動與遊戲發布。" }
                }
            },
            en: {
                header: { title: "STREAMERS", sub: "STREAMERS_LIST" },
                streamers: {
                    1: { name: "Mad Pony", tags: "#FPS_Games #Gaming_Hardware", desc: "Former pro esports player specializing in FPS games. Known for high skill and witty banter. High conversion rate for hardware brands." },
                    2: { name: "Neon", tags: "#Console_Games #3C_Tech", desc: "Cyberpunk themed female streamer. Master of 3C unboxings and AAA console game reviews, holding massive sway over core gamers." },
                    3: { name: "Unit Zero", tags: "#Anime_Games #ACG", desc: "Prominent ACG influencer. Specializes in anime mobile games and tactical card games. High video views on character analysis." },
                    4: { name: "Uncle Breeze", tags: "#MMORPG #Strategy_Games", desc: "Veteran streamer with deep insights into massive MMORPGs and strategy titles. Audience consists of high-spending mature gamers." },
                    5: { name: "Iris", tags: "#Entertainment #Apps", desc: "Charming all-rounder bridging gaming and lifestyle. Excels at promoting games and mobile APPs to mass consumer markets." },
                    6: { name: "Code 404", tags: "#Indie_Games #Hardcore", desc: "High-skill mysterious streamer focusing on Soulslike and brutal indie games. Excellent at generating live memes and hype." },
                    7: { name: "Game Radar", tags: "#New_Releases #Cross_Platform", desc: "Media-style review KOL providing rapid coverage on new titles. Premium choice for publishers launching day-one campaigns." },
                    8: { name: "Cipher", tags: "#Puzzle_Games #Horror", desc: "Brainiac streamer focusing on mystery and horror games. Immersive storytelling style that keeps viewers hooked for narrative-driven games." },
                    9: { name: "Cyber Geek", tags: "#PC_Modding #Premium_3C", desc: "Elite hardware modding expert and reviewer. Focuses on custom water-cooling loops and high-end tech, perfect for premium hardware labs." },
                    10: { name: "Pixel CatX", tags: "#Casual_Games #Mobile", desc: "Cozy streamer with a large student and female following. Highly effective for promoting casual mobile games with cheerful engagement." },
                    11: { name: "SilverWing V", tags: "#VTuber #Virtual_Streamer", desc: "Top virtual talent under Xiaoma Ent. Merges flawlessly with the futuristic aesthetic, ideal for cross-dimensional events." }
                }
            }
        };

        let currentLang = 'ch';

        function switchLang(lang) {
            currentLang = lang;
            document.getElementById('btn-ch').classList.toggle('active', lang === 'ch');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            
            // 更新頁首文字
            document.getElementById('main-header-title').innerText = langData[lang].header.title;
            document.getElementById('main-header-sub').innerText = langData[lang].header.sub;
            
            // 更新 11 個節點的主播資訊
            for (let i = 1; i <= 11; i++) {
                const nameEl = document.getElementById(`name-${i}`);
                const hashEl = document.getElementById(`hash-${i}`);
                if (nameEl) nameEl.innerText = langData[lang].streamers[i].name;
                if (hashEl) hashEl.innerText = langData[lang].streamers[i].tags;
            }
        }

        // 互動功能方案：科技感 HUD 資訊彈窗
        function openModal(id) {
            const data = langData[currentLang].streamers[id];
            document.getElementById('modal-name').innerText = data.name;
            document.getElementById('modal-tags').innerText = data.tags;
            document.getElementById('modal-desc').innerText = data.desc;
            document.getElementById('modal-img').src = `https://api.dicebear.com/7.x/bottts/svg?seed=streamer${id}`;
            
            const modal = document.getElementById('info-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('info-modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }
    </script>
</body>
</html>
