<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小馬娛樂 | 主播陣容 TALENT ROSTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-neon: #8600ff;
            --secondary-neon: #00f3ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050508;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            overflow-x: hidden;
            padding-bottom: 150px;
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; }

        /* 背景設計 */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle at 2px 2px, rgba(134, 0, 255, 0.1) 1px, transparent 0);
            background-size: 40px 40px;
            z-index: -2;
        }

        /* 篩選標籤樣式 */
        .filter-tag {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-family: 'Share Tech Mono';
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            transition: 0.3s;
            cursor: pointer;
            letter-spacing: 1px;
            user-select: none;
        }
        .filter-tag:hover, .filter-tag.active {
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--secondary-neon);
            color: var(--secondary-neon);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        /* 主播卡片內 Hashtag */
        .talent-tag {
            font-size: 9px;
            color: var(--secondary-neon);
            opacity: 0.6;
            background: rgba(0, 243, 255, 0.05);
            padding: 1px 6px;
            border-radius: 4px;
            margin: 1px;
            display: inline-block;
        }

        /* 賽博頭像框共用組件 */
        .cyber-frame {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .glow-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--neon-purple), var(--secondary-neon), transparent);
            opacity: 0.2;
            filter: blur(8px);
            animation: rotate-glow 8s linear infinite;
            transition: 0.5s;
        }

        .thin-border {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            padding: 1px;
            background: linear-gradient(135deg, rgba(188, 19, 254, 0.5), rgba(0, 243, 255, 0.5));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            transition: 0.5s;
        }

        .inner-photo {
            border-radius: 50%;
            overflow: hidden;
            background: #000;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .inner-photo img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(20%) brightness(0.8);
            transition: 0.5s;
        }

        /* 互動效果 */
        .cyber-frame:hover .glow-ring { opacity: 0.8; filter: blur(12px); transform: scale(1.05); }
        .cyber-frame:hover .thin-border { transform: scale(1.05); background: linear-gradient(135deg, var(--neon-purple), var(--secondary-neon)); }
        .cyber-frame:hover .inner-photo img { filter: grayscale(0%) brightness(1.1); transform: scale(1.1); }

        @keyframes rotate-glow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 控制面板 */
        .control-panel { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 1100px; z-index: 1000; }
        .panel-container {
            display: flex; justify-content: center; align-items: center; gap: 40px; padding: 15px 50px;
            background: linear-gradient(180deg, rgba(20, 20, 20, 0.9) 0%, rgba(5, 5, 5, 0.95) 100%);
            backdrop-filter: blur(20px); border-top: 1px solid rgba(134, 0, 255, 0.4); border-radius: 4px;
        }

        .nav-item { font-family: 'Share Tech Mono'; color: #aaa; font-size: 14px; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .nav-item:hover { color: var(--secondary-neon); text-shadow: 0 0 10px var(--secondary-neon); }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container mx-auto px-6 py-12">
        <header class="mb-10 flex flex-col items-start">
            <div class="flex items-center gap-3 mb-4">
                <div class="deco-block w-[10px] h-[10px] bg-[#bc13fe]"></div>
                <span class="cyber-font text-[10px] tracking-[0.6em] text-white/40 uppercase">XIAOMA ENT.</span>
            </div>
            
            <div class="flex flex-col mb-4">
                <h1 id="main-title" class="text-5xl md:text-7xl font-black italic tracking-tighter leading-none mb-2">主播陣容</h1>
                <span id="sub-title" class="cyber-font text-xl md:text-3xl font-black text-white/10 uppercase italic tracking-widest leading-none">TALENT_ROSTER</span>
            </div>
            
            <div class="w-[60px] h-[4px] bg-gradient-to-r from-[#bc13fe] to-[#00d2ff] mb-4"></div>
            <span class="cyber-font text-[10px] text-white/30 tracking-[0.2em] uppercase cursor-pointer hover:text-white" onclick="toggleLanguage()">Click to View in English / 中文切換</span>
        </header>

        <!-- Hashtag 篩選列 -->
        <div class="flex flex-wrap gap-2 mb-16" id="filter-bar"></div>

        <!-- 主播網格 (點擊會跳轉至指定連結) -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-y-16 gap-x-8 justify-items-center mb-32" id="talents-list"></div>
    </div>

    <nav class="control-panel">
        <div class="panel-container">
            <div class="nav-item">HOME</div>
            <div class="nav-item active text-[#00f3ff]">TALENTS</div>
            <div class="nav-item">BUSINESS</div>
            <div class="nav-item">CONTACT</div>
        </div>
    </nav>

    <script>
        let currentLang = 'ch';
        let selectedFilters = [];

        const filterOptions = ["All", "MMORPG", "FPS", "MOBA", "社群紅人/Reels", "跳舞/Dancing", "主持站台/Hosting", "Vtuber"];
        
        // 主播資料設定：請在下方 url 欄位填入對應的 html 網址
        const talentsData = [
            { ch: "小馬大將軍", en: "Gen. Xiaoma", tags: ["FPS", "主持站台/Hosting"], url: "#" },
            { ch: "霓虹喵喵", en: "Neon Meow", tags: ["跳舞/Dancing", "社群紅人/Reels"], url: "#" },
            { ch: "電子幻影", en: "Cyber Phantom", tags: ["MMORPG", "Vtuber"], url: "#" },
            { ch: "數據浪客", en: "Data Ronin", tags: ["MOBA", "FPS"], url: "#" },
            { ch: "極光女神", en: "Aurora Goddess", tags: ["社群紅人/Reels", "主持站台/Hosting"], url: "#" },
            { ch: "代碼殺手", en: "Code Killer", tags: ["MOBA", "MMORPG"], url: "#" },
            { ch: "虛擬戰士", en: "Virtual Warrior", tags: ["FPS", "Vtuber"], url: "#" },
            { ch: "像素精靈", en: "Pixel Sprite", tags: ["跳舞/Dancing", "Vtuber"], url: "#" },
            { ch: "流光射手", en: "Glow Archer", tags: ["FPS", "MOBA"], url: "#" },
            { ch: "矩陣先鋒", en: "Matrix Vanguard", tags: ["MMORPG", "社群紅人/Reels"], url: "#" },
            { ch: "核心脈衝", en: "Core Pulse", tags: ["MOBA", "主持站台/Hosting"], url: "#" },
            { ch: "超頻駭客", en: "Overclock Hacker", tags: ["FPS", "社群紅人/Reels"], url: "#" },
            { ch: "極限傳奇", en: "Limit Legend", tags: ["MMORPG", "主持站台/Hosting"], url: "#" }
        ];

        const listContainer = document.getElementById('talents-list');
        const filterBar = document.getElementById('filter-bar');
        
        function renderFilters() {
            filterBar.innerHTML = '';
            filterOptions.forEach(opt => {
                const btn = document.createElement('div');
                const isAll = opt === 'All';
                const isActive = isAll ? selectedFilters.length === 0 : selectedFilters.includes(opt);
                btn.className = `filter-tag ${isActive ? 'active' : ''}`;
                btn.innerText = opt;
                btn.onclick = () => {
                    if (isAll) { selectedFilters = []; } 
                    else {
                        if (selectedFilters.includes(opt)) {
                            selectedFilters = selectedFilters.filter(f => f !== opt);
                        } else {
                            selectedFilters.push(opt);
                        }
                    }
                    renderFilters(); renderTalents();
                };
                filterBar.appendChild(btn);
            });
        }

        function renderTalents() {
            listContainer.innerHTML = '';
            talentsData.forEach((data, i) => {
                const isMatch = selectedFilters.length === 0 || selectedFilters.every(filter => data.tags.includes(filter));
                if (!isMatch) return;

                const displayName = currentLang === 'ch' ? data.ch : data.en;
                const item = document.createElement('div');
                item.className = 'talent-item';
                item.innerHTML = `
                    <div class="cyber-frame w-[140px] h-[140px]" onclick="navigateToTalent(${i})">
                        <div class="glow-ring"></div>
                        <div class="thin-border"></div>
                        <div class="inner-photo w-[126px] h-[126px]">
                            <img src="https://picsum.photos/seed/talent${i+20}/300/300" alt="${displayName}">
                        </div>
                    </div>
                    <div class="text-center">
                        <div class="cyber-font text-[11px] tracking-[0.2em] text-white/90 uppercase font-bold mb-1">${displayName}</div>
                        <div class="flex flex-wrap justify-center gap-1">
                            ${data.tags.map(t => `<span class="talent-tag">#${t}</span>`).join('')}
                        </div>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        // 點擊跳轉函式
        function navigateToTalent(index) {
            const targetUrl = talentsData[index].url;
            if (targetUrl && targetUrl !== "#") {
                window.location.href = targetUrl;
            } else {
                console.log("尚未設定跳轉連結網址");
                // 為了測試，如果是 "#" 可以先跳提示或不動作
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ch' ? 'en' : 'ch';
            document.getElementById('main-title').innerText = currentLang === 'ch' ? '主播陣容' : 'TALENT ROSTER';
            document.getElementById('sub-title').innerText = currentLang === 'ch' ? 'TALENT_ROSTER' : 'CYBER_INFLUENCERS';
            renderTalents();
        }

        renderFilters();
        renderTalents();
    </script>
</body>
</html>
